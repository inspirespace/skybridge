<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skybridge Mockup 006 — Aviation Radar Motif</title>
    <style>
      :root {
        --ink: #0c1222;
        --muted: #5a6a7a;
        --panel: rgba(255, 255, 255, 0.92);
        --border: rgba(12, 18, 34, 0.12);
        --accent: #1f6fff;
        --accent-2: #0f172a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #e8f3ff 0%, #d6e6f6 35%, #c8d7ea 70%, #b9cadf 100%);
        min-height: 100vh;
      }
      .radar {
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(circle at 30% 20%, rgba(31, 111, 255, 0.08) 0 120px, transparent 120px),
          radial-gradient(circle at 30% 20%, rgba(31, 111, 255, 0.06) 0 240px, transparent 240px),
          radial-gradient(circle at 30% 20%, rgba(31, 111, 255, 0.04) 0 360px, transparent 360px),
          repeating-linear-gradient(0deg, rgba(255,255,255,0.3) 0 1px, transparent 1px 120px),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.3) 0 1px, transparent 1px 120px);
        opacity: 0.4;
        pointer-events: none;
      }
      .frame { max-width: 1120px; margin: 0 auto; padding: 42px 24px 120px; position: relative; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      .brand { display: flex; align-items: center; gap: 12px; }
      .mark { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, #1f6fff, #0f172a); display: grid; place-items: center; color: #fff; font-weight: 700; }
      .title { font-weight: 700; letter-spacing: 0.08em; font-size: 0.9rem; }
      .subtitle { color: var(--muted); font-size: 0.85rem; }
      .status { padding: 8px 14px; border-radius: 999px; background: rgba(31, 111, 255, 0.12); color: #1a4db0; font-weight: 600; font-size: 0.85rem; }
      .hero { margin-top: 24px; padding: 22px 24px; border-radius: 16px; background: var(--panel); border: 1px solid var(--border); box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08); }
      .hero h1 { margin: 0 0 6px; font-size: 1.9rem; }
      .hero p { margin: 0; color: var(--muted); }
      .stepper { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
      .step { border-radius: 999px; padding: 6px 10px; background: var(--panel); border: 1px solid var(--border); font-size: 0.82rem; }
      .layout { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 16px; margin-top: 18px; }
      .section { background: var(--panel); border-radius: 14px; border: 1px solid var(--border); padding: 16px; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: rgba(15, 23, 42, 0.06); color: var(--muted); font-size: 0.78rem; }
      .field { background: rgba(15, 23, 42, 0.06); border-radius: 10px; height: 40px; margin-top: 10px; }
      .span-6 { grid-column: span 6; }
      .span-4 { grid-column: span 4; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }
      .cta-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
      .cta { background: var(--accent); color: white; padding: 10px 16px; border-radius: 10px; border: none; font-weight: 600; }
      .cta.secondary { background: var(--accent-2); }
      .ghost { background: transparent; border: 1px solid var(--border); padding: 9px 14px; border-radius: 10px; color: var(--muted); }
      @media (max-width: 980px) {
        .span-6, .span-4, .span-8 { grid-column: span 12; }
        header { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="radar"></div>
    <div class="frame">
      <header>
        <div class="brand">
          <div class="mark">SB</div>
          <div>
            <div class="title">SKYBRIDGE</div>
            <div class="subtitle">CloudAhoy → FlySto</div>
          </div>
        </div>
        <div class="status">Signed in · Ready</div>
      </header>

      <section class="hero">
        <h1>Import flights with confidence</h1>
        <p>Run a review, verify the summary, then approve the import.</p>
      </section>

      <section class="stepper">
        <div class="step">Connect</div>
        <div class="step">Review</div>
        <div class="step">Import</div>
        <div class="step">Report</div>
      </section>

      <section class="layout">
        <div class="section span-6">
          <div class="section-header">
            <h3>CloudAhoy</h3>
            <span class="badge">Connected</span>
          </div>
          <div class="field"></div>
          <div class="field"></div>
        </div>
        <div class="section span-6">
          <div class="section-header">
            <h3>FlySto</h3>
            <span class="badge">Connected</span>
          </div>
          <div class="field"></div>
          <div class="field"></div>
        </div>

        <div class="section span-4">
          <div class="section-header">
            <h3>Filters</h3>
            <span class="badge">Optional</span>
          </div>
          <div class="field"></div>
          <div class="field"></div>
        </div>

        <div class="section span-8">
          <div class="section-header">
            <h3>Review summary</h3>
            <span class="badge">46 flights</span>
          </div>
          <div class="field"></div>
          <div class="field"></div>
        </div>

        <div class="section span-12">
          <div class="section-header">
            <h3>Import</h3>
            <span class="badge">Locked until review approved</span>
          </div>
          <div class="cta-row">
            <button class="cta">Run review</button>
            <button class="cta secondary">Approve import</button>
            <button class="ghost">Clear job</button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
