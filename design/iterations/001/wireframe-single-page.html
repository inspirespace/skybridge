<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skybridge Wireframe A — Single Page Guided Flow</title>
    <style>
      :root {
        --ink: #1d1f23;
        --muted: #6b7280;
        --border: #d7dbe0;
        --panel: #ffffff;
        --bg: #f3f4f6;
        --accent: #2f6fed;
        --accent-2: #f5a524;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .frame {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .logo {
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .status-pill {
        background: #eaf1ff;
        color: #1741a6;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
      }
      .stepper {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 24px 0 20px;
      }
      .step {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.9rem;
      }
      .hero {
        background: var(--panel);
        border: 2px dashed var(--border);
        padding: 20px;
        border-radius: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-top: 18px;
      }
      .card {
        background: var(--panel);
        border: 2px dashed var(--border);
        border-radius: 14px;
        padding: 16px;
      }
      .span-6 { grid-column: span 6; }
      .span-4 { grid-column: span 4; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }
      .line {
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        margin: 10px 0;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        border: none;
      }
      .ghost {
        background: transparent;
        border: 2px dashed var(--border);
        color: var(--muted);
        padding: 10px 14px;
        border-radius: 10px;
      }
      .table {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 8px;
        margin-top: 10px;
      }
      .row {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 0.6fr;
        gap: 8px;
        padding: 8px;
      }
      .muted { color: var(--muted); }
      @media (max-width: 900px) {
        .stepper { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .span-6, .span-8, .span-4 { grid-column: span 12; }
        header { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <header>
        <div class="logo">SKYBRIDGE</div>
        <div class="status-pill">Status: Signed in</div>
      </header>

      <div class="stepper">
        <div class="step">1. Connect</div>
        <div class="step">2. Review</div>
        <div class="step">3. Import</div>
        <div class="step">4. Report</div>
      </div>

      <section class="hero">
        <h2>Import flights from CloudAhoy to FlySto</h2>
        <p class="muted">Run a review, verify the summary, and approve the import.</p>
      </section>

      <section class="grid">
        <div class="card span-6">
          <h3>Connect CloudAhoy</h3>
          <div class="line"></div>
          <div class="line" style="width: 70%"></div>
        </div>
        <div class="card span-6">
          <h3>Connect FlySto</h3>
          <div class="line"></div>
          <div class="line" style="width: 70%"></div>
        </div>
        <div class="card span-4">
          <h3>Filters</h3>
          <div class="line"></div>
          <div class="line" style="width: 60%"></div>
          <div class="line" style="width: 40%"></div>
        </div>
        <div class="card span-8">
          <h3>Review summary</h3>
          <div class="line" style="width: 50%"></div>
          <div class="line" style="width: 35%"></div>
          <div class="table">
            <div class="row muted">
              <div>ID</div>
              <div>Date</div>
              <div>Tail</div>
              <div>Origin</div>
              <div>Destination</div>
              <div>Status</div>
            </div>
            <div class="row">
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
            </div>
          </div>
        </div>
        <div class="card span-12">
          <h3>Import progress</h3>
          <div class="line"></div>
          <div class="line" style="width: 30%"></div>
        </div>
      </section>

      <div style="margin-top: 22px; display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="cta">Run review</button>
        <button class="ghost">Approve import</button>
      </div>
    </div>
  </body>
</html>
