<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skybridge Mockup B — Aviation Themed Wizard</title>
    <style>
      :root {
        --ink: #0b1220;
        --muted: #526072;
        --panel: rgba(255, 255, 255, 0.92);
        --border: rgba(11, 18, 32, 0.12);
        --accent: #1c7dff;
        --accent-2: #f2a93b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #dfefff 0%, #c4d9f3 45%, #b1c9e6 100%);
        min-height: 100vh;
      }
      .runway {
        position: fixed;
        inset: 0;
        background-image: linear-gradient(0deg, rgba(255,255,255,0.6) 2px, transparent 2px),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.2) 0 40px, transparent 40px 80px);
        background-size: 100% 26px, 120px 120px;
        opacity: 0.2;
        pointer-events: none;
      }
      .frame {
        max-width: 1000px;
        margin: 0 auto;
        padding: 36px 24px 120px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand { font-weight: 700; letter-spacing: 0.08em; }
      .progress-pill {
        background: rgba(28, 125, 255, 0.16);
        color: #1648a8;
        font-weight: 600;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.85rem;
      }
      .stepper {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 24px 0;
      }
      .step {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 999px;
        text-align: center;
        padding: 10px 12px;
        font-size: 0.85rem;
      }
      .panel {
        background: var(--panel);
        border-radius: 22px;
        border: 1px solid var(--border);
        padding: 24px;
        box-shadow: 0 18px 30px rgba(15, 31, 58, 0.12);
      }
      .field { height: 42px; background: rgba(15, 31, 58, 0.06); border-radius: 12px; margin-top: 12px; }
      .cta-row { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
      .cta { background: var(--accent); color: #fff; border: none; padding: 12px 18px; border-radius: 12px; font-weight: 600; }
      .ghost { background: transparent; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; color: var(--muted); }
      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .card {
        background: rgba(255,255,255,0.8);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
      }
      .card h4 { margin: 0 0 8px; font-size: 0.95rem; }
      .pill { display: inline-flex; gap: 6px; align-items: center; padding: 6px 10px; border-radius: 999px; background: rgba(15, 31, 58, 0.08); color: var(--muted); font-size: 0.78rem; }
      @media (max-width: 900px) {
        .stepper { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .summary { grid-template-columns: 1fr; }
        header { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="runway"></div>
    <div class="frame">
      <header>
        <div class="brand">SKYBRIDGE</div>
        <div class="progress-pill">Step 1 of 4 · Connect</div>
      </header>

      <div class="stepper">
        <div class="step">Connect</div>
        <div class="step">Review</div>
        <div class="step">Import</div>
        <div class="step">Report</div>
      </div>

      <section class="panel">
        <h2>Connect your accounts</h2>
        <p class="pill">We use credentials only for this job</p>
        <div class="field"></div>
        <div class="field"></div>
        <div class="field"></div>
        <div class="field"></div>
        <div class="cta-row">
          <button class="cta">Continue to Review</button>
          <button class="ghost">Save & exit</button>
        </div>
      </section>

      <section class="panel" style="margin-top: 22px;">
        <h3>What comes next</h3>
        <div class="summary">
          <div class="card">
            <h4>Review summary</h4>
            <div class="pill">46 flights · 92.4 hours</div>
          </div>
          <div class="card">
            <h4>Approve import</h4>
            <div class="pill">Warnings surfaced</div>
          </div>
          <div class="card">
            <h4>Live report</h4>
            <div class="pill">Downloadable</div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
