services:
  api:
    build:
      context: .
      dockerfile: docker/backend-dev/Dockerfile
    command: ["python", "-m", "uvicorn", "src.backend.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - backend_data:/app/data/backend
    environment:
      - BACKEND_DATA_DIR=/app/data/backend/jobs
    depends_on:
      - dynamodb
      - minio

  worker:
    build:
      context: .
      dockerfile: docker/backend-dev/Dockerfile
    command: ["python", "-m", "src.backend.worker"]
    volumes:
      - ./:/app
      - backend_data:/app/data/backend
    environment:
      - BACKEND_DATA_DIR=/app/data/backend/jobs
    depends_on:
      - dynamodb
      - minio

  dynamodb:
    image: amazon/dynamodb-local:2.5.0
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]

volumes:
  backend_data:
