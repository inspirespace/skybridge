services:
  caddy:
    image: caddy:2.10
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/https/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/https/certs:/etc/caddy/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      frontend:
        condition: service_started
      firebase-emulator:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./src/frontend:/app
      - ./.firebaserc:/workspace/.firebaserc:ro
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      - FIREBASERC_FILE=/workspace/.firebaserc
      - VITE_API_BASE_URL=https://skybridge.localhost/api
      - AUTH_MODE=${AUTH_MODE:-firebase}
      - VITE_FIREBASE_API_KEY=demo-local
      - VITE_FIREBASE_APP_ID=demo-local-app
      - VITE_FIREBASE_USE_EMULATOR=1
      - VITE_FIREBASE_AUTH_EMULATOR_HOST=https://skybridge.localhost
      - VITE_FIREBASE_ENABLE_GOOGLE=0
      - VITE_FIREBASE_ENABLE_APPLE=0
      - VITE_FIREBASE_ENABLE_FACEBOOK=0
      - VITE_FIREBASE_ENABLE_MICROSOFT=0
      - VITE_FIREBASE_ENABLE_GUEST=0
      - VITE_FIRESTORE_LISTEN=1
      - FIRESTORE_JOBS_COLLECTION=${FIRESTORE_JOBS_COLLECTION:-skybridge-jobs}
      - BACKEND_RETENTION_DAYS=${BACKEND_RETENTION_DAYS:-7}
      - VITE_DEV_PREFILL_CREDENTIALS=${DEV_PREFILL_CREDENTIALS}
      - CLOUD_AHOY_EMAIL=${CLOUD_AHOY_EMAIL}
      - CLOUD_AHOY_PASSWORD=${CLOUD_AHOY_PASSWORD}
      - FLYSTO_EMAIL=${FLYSTO_EMAIL}
      - FLYSTO_PASSWORD=${FLYSTO_PASSWORD}

  firebase-emulator:
    image: node:24-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - firebase_emulator_data:/firebase-emulator
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache curl python3 py3-pip py3-virtualenv openjdk21-jre && java -version && npm install -g firebase-tools@15.7.0 && VENV_DIR=/firebase-emulator/functions-venv && if [ -f \"$$VENV_DIR/bin/activate\" ] && ! grep -q \"$$VENV_DIR\" \"$$VENV_DIR/bin/activate\"; then rm -rf \"$$VENV_DIR\"; fi && if [ ! -x \"$$VENV_DIR/bin/python\" ]; then rm -rf \"$$VENV_DIR\" && python3 -m venv \"$$VENV_DIR\"; fi && if [ -e /workspace/functions/venv ] && [ ! -L /workspace/functions/venv ]; then rm -rf /workspace/functions/venv; fi && ln -sfn \"$$VENV_DIR\" /workspace/functions/venv && ln -sfn \"$$VENV_DIR/bin/python\" \"$$VENV_DIR/bin/python3.11\" && if [ -d \"$$VENV_DIR/lib/python3.12\" ]; then ln -sfn \"$$VENV_DIR/lib/python3.12\" \"$$VENV_DIR/lib/python3.11\"; fi && \"$$VENV_DIR/bin/python\" -m ensurepip --upgrade && \"$$VENV_DIR/bin/python\" -m pip install -r /workspace/functions/requirements.txt && mkdir -p /firebase-emulator/exports && PROJECT_ID=$$(sh /workspace/scripts/firebase-config.sh project) && REGION=$$(sh /workspace/scripts/firebase-config.sh region) && if [ -z \"$$PROJECT_ID\" ]; then echo 'Missing default Firebase project in .firebaserc' >&2; exit 1; fi && cd /workspace && FIREBASE_REGION=\"$$REGION\" firebase emulators:start --config /workspace/firebase.json --project \"$$PROJECT_ID\" --only auth,firestore,pubsub,storage,functions,hosting --import /firebase-emulator/exports --export-on-exit /firebase-emulator/exports"
      ]
    environment:
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
      - GUNICORN_CMD_ARGS=--no-control-socket
      - AUTH_EMULATOR_TRUST_TOKENS=1
      - PUBSUB_EMULATOR_HOST=firebase-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - STORAGE_EMULATOR_HOST=http://firebase-emulator:9199
      - AUTH_MODE=firebase
      - BACKEND_ENCRYPTION_KEY=${BACKEND_ENCRYPTION_KEY}
      - CORS_ALLOW_ORIGINS=https://skybridge.localhost,https://emulator.skybridge.localhost
      - BACKEND_USE_WORKER=true
      - BACKEND_PUBSUB_ENABLED=1
      - PUBSUB_TOPIC=skybridge-job-queue
      - BACKEND_FIRESTORE_ENABLED=1
      - FIRESTORE_JOBS_COLLECTION=skybridge-jobs
      - FIRESTORE_CREDENTIALS_COLLECTION=skybridge-credentials
      - BACKEND_GCS_ENABLED=1
      - GCS_BUCKET=skybridge-artifacts
      - GCS_PREFIX=jobs
      - GCS_CREATE_BUCKET=1
      - BACKEND_CREDENTIAL_TTL=900
      - BACKEND_RECONCILE=true
      - BACKEND_WAIT_FOR_PROCESSING=true
      - BACKEND_PROCESSING_INTERVAL=20
      - BACKEND_PROCESSING_TIMEOUT=3600
      - DEV_USE_MOCKS=${DEV_USE_MOCKS:-1}
      - MOCK_CLOUD_AHOY_BASE_URL=http://mock-cloudahoy:8081/api
      - MOCK_FLYSTO_BASE_URL=http://mock-flysto:8082
      - FLYSTO_API_VERSION=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"http=require('http'); const req=http.get('http://localhost:9099',res=>process.exit(0)); req.on('error',()=>process.exit(1));\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  mock-cloudahoy:
    build:
      context: .
      dockerfile: docker/backend-dev/Dockerfile
    command: ["python", "-m", "uvicorn", "src.backend.mocks.cloudahoy:app", "--host", "0.0.0.0", "--port", "8081"]
    volumes:
      - ./:/app
    environment:
      - MOCK_RUN_DIR=/app/tests/fixtures/run-20251228T185601Z

  mock-flysto:
    build:
      context: .
      dockerfile: docker/backend-dev/Dockerfile
    command: ["python", "-m", "uvicorn", "src.backend.mocks.flysto:app", "--host", "0.0.0.0", "--port", "8082"]
    volumes:
      - ./:/app
    environment:
      - MOCK_RUN_DIR=/app/tests/fixtures/run-20251228T185601Z

volumes:
  firebase_emulator_data:
