<script>
  (function () {
    var storageKey = "skybridge-theme";
    var root = document.documentElement;
    var toggle = document.getElementById("theme-switch");
    var thumb = document.querySelector("[data-thumb]");
    var stored = localStorage.getItem(storageKey);
    if (stored === "dark") {
      root.classList.add("dark");
      if (toggle) toggle.setAttribute("aria-checked", "true");
      if (toggle) toggle.setAttribute("data-state", "checked");
      if (thumb) thumb.setAttribute("data-state", "checked");
    }
    if (toggle) {
      toggle.addEventListener("click", function () {
        var isDark = root.classList.toggle("dark");
        localStorage.setItem(storageKey, isDark ? "dark" : "light");
        toggle.setAttribute("aria-checked", isDark ? "true" : "false");
        toggle.setAttribute("data-state", isDark ? "checked" : "unchecked");
        if (thumb) thumb.setAttribute("data-state", isDark ? "checked" : "unchecked");
      });
    }
    var appButtons = document.querySelectorAll("[data-go-app]");
    appButtons.forEach(function (button) {
      button.addEventListener("click", function () {
        var forceLogin = localStorage.getItem("skybridge_force_login") === "1";
        var target = forceLogin ? "/app/?signin=1&force=1" : "/app/?signin=1";
        window.location.assign(target);
      });
    });
    var isSignedIn = Boolean(
      localStorage.getItem("skybridge_access_token") || localStorage.getItem("skybridge_user_id")
    );
    var backLinks = document.querySelectorAll("[data-back-link]");
    if (backLinks.length) {
      backLinks.forEach(function (link) {
        link.setAttribute("href", isSignedIn ? "/app/" : "/");
        link.textContent = isSignedIn ? "Back to app" : "Back to landing page";
      });
    }
    var homeLinks = document.querySelectorAll("[data-home-link]");
    if (homeLinks.length) {
      homeLinks.forEach(function (link) {
        link.setAttribute("href", isSignedIn ? "/app/" : "/");
      });
    }
  })();
</script>
