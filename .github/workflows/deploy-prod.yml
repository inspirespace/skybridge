name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: "Auto-approve Terraform apply"
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      TF_VARS_FILE: infra/terraform/envs/prod/terraform.tfvars
      TF_BACKEND_CONFIG_FILE: infra/terraform/backend.hcl
      SKYBRIDGE_AUTO_APPROVE: ${{ inputs.auto_approve == 'true' && '1' || '0' }}
      TF_VAR_backend_worker_token: ${{ secrets.BACKEND_WORKER_TOKEN }}
      TF_VAR_cognito_identity_providers: ${{ secrets.COGNITO_IDPS || '[]' }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_facebook_client_id: ${{ secrets.FACEBOOK_CLIENT_ID }}
      TF_VAR_facebook_client_secret: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
      TF_VAR_apple_client_id: ${{ secrets.APPLE_CLIENT_ID }}
      TF_VAR_apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
      TF_VAR_apple_key_id: ${{ secrets.APPLE_KEY_ID }}
      TF_VAR_apple_private_key: ${{ secrets.APPLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Install frontend dependencies
        run: npm --prefix src/frontend ci

      - name: Write Terraform backend config
        run: |
          cat > "$TF_BACKEND_CONFIG_FILE" <<EOF
          bucket = "${{ secrets.TF_STATE_BUCKET }}"
          key    = "${{ secrets.TF_STATE_KEY }}"
          region = "${{ secrets.TF_STATE_REGION }}"
          dynamodb_table = "${{ secrets.TF_STATE_DDB_TABLE }}"
          EOF

      - name: Deploy
        run: ./scripts/deploy-prod.sh
