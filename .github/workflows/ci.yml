name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --extra dev

      - name: Run pytest
        run: |
          mkdir -p test-results/pytest coverage
          uv run pytest \
            --junitxml=test-results/pytest/results.xml \
            --cov=src \
            --cov-report=xml:coverage/coverage.xml \
            --cov-report=term-missing

      - name: Pytest report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: pytest
          path: test-results/pytest/results.xml
          reporter: java-junit

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            test-results/pytest/results.xml
            coverage/coverage.xml

      - name: Coverage summary
        if: always()
        run: uv run coverage report -m >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          mkdir -p test-results/vitest
          npm run test:ci

      - name: Vitest report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: vitest
          path: src/frontend/test-results/vitest/results.xml
          reporter: java-junit

      - name: Upload vitest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: |
            src/frontend/test-results/vitest/results.xml
            src/frontend/coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results/playwright
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: results.xml
        run: |
          mkdir -p test-results/playwright
          npm run test:e2e:ci

      - name: Playwright report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: playwright
          path: src/frontend/test-results/playwright/results.xml
          reporter: java-junit

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            src/frontend/test-results/playwright/results.xml
            src/frontend/playwright-report
