name: Deploy (Firebase)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      BACKEND_ENCRYPTION_KEY: ${{ secrets.BACKEND_ENCRYPTION_KEY }}
      FIREBASE_WEB_APP_ID: ${{ secrets.FIREBASE_WEB_APP_ID }}
      FIREBASE_APP_CHECK_SITE_KEY: ${{ secrets.FIREBASE_APP_CHECK_SITE_KEY }}
    steps:
      - name: Preflight deploy requirements
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ] || [ -z "${BACKEND_ENCRYPTION_KEY:-}" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT and/or BACKEND_ENCRYPTION_KEY secrets." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.3.1

      - name: Deploy functions and hosting (shared script)
        run: |
          ./scripts/firebase-deploy.sh
