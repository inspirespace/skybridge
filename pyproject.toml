[project]
name = "skybridge"
version = "0.1.0"
description = "Migrate CloudAhoy flights to FlySto"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "playwright==1.49.0",
  "requests==2.32.3",
  "rich==13.7.1",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.4",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
